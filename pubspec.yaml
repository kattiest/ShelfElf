name: shelf_elf
description: A food inventory management app with barcode scanning and meal planning.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.2
  path: ^1.9.0
  mobile_scanner: ^7.0.0
  http: ^1.2.1
  intl: ^0.19.0
  provider: ^6.1.2
  cupertino_icons: ^1.0.6
  speech_to_text: ^7.0.0
  flutter_markdown: ^0.7.6
  app_links: ^6.4.0
  share_plus: ^10.1.4
  shared_preferences: ^2.3.2
  # Firebase — sync and shared accounts
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
