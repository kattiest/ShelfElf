name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Generate Flutter engine files
        run: flutter build ios --simulator
        # Build for simulator first — no signing needed at all,
        # this generates the Flutter.framework and plugin artifacts
        # that xcodebuild needs without touching device signing.

      - name: Archive with xcodebuild (unsigned device build)
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $RUNNER_TEMP/ShelfElf.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty --color

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r "$RUNNER_TEMP/ShelfElf.xcarchive/Products/Applications/Runner.app" Payload/
          zip -r ShelfElf.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: ShelfElf-ios
          path: ShelfElf.ipa
          retention-days: 30
