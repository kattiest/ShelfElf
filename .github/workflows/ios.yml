name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Build Flutter iOS release (no codesign)
        run: flutter build ios --release --no-codesign
        env:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
          DEVELOPMENT_TEAM: ""

      - name: Archive with xcodebuild
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath "$RUNNER_TEMP/ShelfElf.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            | xcpretty --color

      - name: Verify archive exists
        run: |
          ls -la "$RUNNER_TEMP/ShelfElf.xcarchive/Products/Applications/"

      - name: Package IPA (correct structure)
        run: |
          cd "$RUNNER_TEMP"
          mkdir -p IPA/Payload
          cp -r "ShelfElf.xcarchive/Products/Applications/Runner.app" "IPA/Payload/"
          cd IPA
          # Use ditto which preserves symlinks and resource forks correctly
          ditto -c -k --sequesterRsrc --keepParent "Payload" "$RUNNER_TEMP/ShelfElf.ipa"

      - name: Verify IPA
        run: |
          ls -lh "$RUNNER_TEMP/ShelfElf.ipa"
          unzip -l "$RUNNER_TEMP/ShelfElf.ipa" | head -20

      - uses: actions/upload-artifact@v4
        with:
          name: ShelfElf-ios
          path: ${{ runner.temp }}/ShelfElf.ipa
          retention-days: 30
